<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASCII camera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app" class="app-root">
    <div class="canvas-wrap">
      <div id="canvas-host" class="canvas-host">
        <canvas id="particles" aria-hidden="true"></canvas>
      </div>
    </div>

    <div class="eye-launch">
      <button type="button" class="btn-eye" id="eye-btn">Enable eye tracking</button>
    </div>

    <div id="calibration-overlay" class="calibration-overlay" hidden>
      <p class="calibration-title">Calibrate eye tracking</p>
      <p class="calibration-hint">Look at the dot, then click anywhere to record. Do not follow the cursor with your eyes.</p>
      <div id="calibration-dot" class="calibration-dot" hidden></div>
      <p id="calibration-progress" class="calibration-progress"></p>
    </div>
    <div id="gaze-dot" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.js" crossorigin="anonymous"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
